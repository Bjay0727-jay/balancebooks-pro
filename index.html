<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12233d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Balance Books" />
    <meta name="description" content="Personal finance management with privacy-first design. Track expenses, set budgets, and manage debts - all stored locally on your device." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://localhost:5555 https://content.dropboxapi.com https://api.dropboxapi.com; img-src 'self' data: blob:;" />
    <title>Balance Books Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      integrity="sha512-Y2MFXM9UrFPjoySoZMveQ5jNfJbR+II4m4s4O3JgUfS3XWZX85WRGDRPFU1iFfNLGBLODP3GPsKB0RIQWUFIQ=="
      crossorigin="anonymous"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #f8fafc;
      }
      /* PWA Install Banner */
      .pwa-install-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #00b4d8 0%, #0096b7 100%);
        color: white;
        padding: 16px;
        display: none;
        align-items: center;
        justify-content: space-between;
        z-index: 9999;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      }
      .pwa-install-banner.show { display: flex; }
      .pwa-install-btn {
        background: white;
        color: #00b4d8;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      .pwa-dismiss {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        padding: 8px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" onfocus="this.style.position='static';this.style.width='auto';this.style.height='auto';" onblur="this.style.position='absolute';this.style.left='-9999px';this.style.width='1px';this.style.height='1px';">Skip to content</a>
    <div id="root"></div>

    <!-- PWA Install Banner -->
    <div class="pwa-install-banner" id="pwa-banner" role="alert">
      <div>
        <strong>Install Balance Books</strong>
        <p style="font-size: 12px; opacity: 0.9;">Add to home screen for the best experience</p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="pwa-install-btn" id="pwa-install" aria-label="Install Balance Books as app">Install</button>
        <button class="pwa-dismiss" id="pwa-dismiss" aria-label="Dismiss install banner">&#x2715;</button>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA Install -->
    <script>
      // PWA Install Prompt
      let deferredPrompt;
      const banner = document.getElementById('pwa-banner');
      const installBtn = document.getElementById('pwa-install');
      const dismissBtn = document.getElementById('pwa-dismiss');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install banner if not dismissed before
        if (!localStorage.getItem('pwa-dismissed')) {
          banner.classList.add('show');
        }
      });

      installBtn?.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('PWA install:', outcome);
          deferredPrompt = null;
          banner.classList.remove('show');
        }
      });

      dismissBtn?.addEventListener('click', () => {
        banner.classList.remove('show');
        localStorage.setItem('pwa-dismissed', 'true');
      });

      // Hide banner if already installed
      window.addEventListener('appinstalled', () => {
        banner.classList.remove('show');
        console.log('Balance Books installed as PWA!');
      });
    </script>
  </body>
</html>
