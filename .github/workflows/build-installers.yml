name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.1.0)'
        required: false
        default: '2.1.0'

permissions:
  contents: write

jobs:
  # ============================================
  # VALIDATE (lint & build web)
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint || echo "Lint skipped (eslint not configured)"
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

  # ============================================
  # BUILD WINDOWS INSTALLER (.exe)
  # ============================================
  build-windows:
    needs: [validate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || '2.1.0' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        shell: bash
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.VERSION }}"/' package.json
          cat package.json | grep version

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build Windows installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release folder
        run: dir release
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # BUILD MAC INSTALLERS (.dmg for Intel & ARM)
  # ============================================
  build-mac:
    needs: [validate]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || '2.1.0' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          sed -i '' 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.VERSION }}"/' package.json
          cat package.json | grep version

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build Mac installers
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release folder
        run: ls -la release/

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # BUILD LINUX INSTALLER (.AppImage)
  # ============================================
  build-linux:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || '2.1.0' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.VERSION }}"/' package.json
          cat package.json | grep version

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build Linux installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release folder
        run: ls -la release/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # CREATE GITHUB RELEASE WITH ALL INSTALLERS
  # ============================================
  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \)

      - name: Delete existing release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name || format('v{0}', github.event.inputs.version) }}"
          echo "Looking for existing release with tag: $TAG"

          # Get the release ID for this tag
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id // empty')

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "Found release ID: $RELEASE_ID — deleting existing assets..."
            # List all assets on this release
            ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
              | jq -r '.[].id')

            for ASSET_ID in $ASSETS; do
              echo "Deleting asset $ASSET_ID..."
              curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"
            done
            echo "All existing assets deleted."
          else
            echo "No existing release found for tag $TAG — nothing to clean up."
          fi

      - uses: softprops/action-gh-release@4634c16e79c963813287e889244c50009e7f0981
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: Balance Books Pro ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `.exe` installer | Standard Windows installer |
            | **Mac (Intel)** | `.dmg` | For Intel-based Macs |
            | **Mac (Apple Silicon)** | `-arm64.dmg` | For M1/M2/M3/M4 Macs |
            | **Linux** | `.AppImage` | Universal Linux package |

            ## Web App
            Use instantly at: https://app.balancebooksapp.com

            ## What's New in v2.1.0

            ### Redesigned Brand & UI
            - New color scheme matching the BalanceBooks landing page (teal #00b4d8 / navy #12233d)
            - New rounded-rect ledger logo replacing the shield icon
            - DM Sans font replacing Inter across the entire app
            - Updated PWA manifest, theme colors, and install banner

            ### Split Transactions
            - Split a single transaction across multiple category allocations
            - Visual split badge on transactions with category breakdowns
            - Budget engine updated for accurate split-aware category tracking

            ### Keyboard Shortcuts & Accessibility
            - Press N for new transaction, / for search, arrow keys for month navigation
            - Press 1-5 to switch views, ? for shortcut help overlay
            - ARIA labels on all interactive elements for screen reader support

            ### Offline-First PWA Hardening
            - Enhanced service worker with navigate fallback and client claims
            - Outdated cache cleanup for reliable offline behavior
            - Improved Workbox caching strategies for fonts and CDN resources

            ### License & Analytics Infrastructure
            - Stripe license activation/deactivation flow
            - Privacy-respecting analytics opt-in with sendBeacon
            - Pro feature gating (Dropbox sync, debt planner, analytics, unlimited transactions)
          files: |
            windows-installer/*
            mac-installer/*
            linux-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
